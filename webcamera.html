<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC Camera Chat</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0f19;
      color: #edf2f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0f19;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 16px;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: #cbd5e1;
    }

    p {
      margin: 0;
      color: #a8b3c7;
      line-height: 1.6;
    }

    details {
      border-top: 1px solid #263244;
      padding-top: 14px;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 15px;
      background: #2d8cff;
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: #1477e8;
    }

    button.secondary {
      background: #2a3444;
    }

    button.secondary:hover {
      background: #39465a;
    }

    button.danger {
      background: #e23b3b;
    }

    button.danger:hover {
      background: #c62828;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px;
      background: #0f1724;
      color: #edf2f7;
    }

    input::placeholder,
    textarea::placeholder {
      color: #7b8798;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    summary {
      cursor: pointer;
      color: #dbeafe;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 58px;
      padding: 12px 18px;
      background: #111827;
      border-bottom: 1px solid #253044;
    }

    .topbar-copy {
      font-size: 13px;
    }

    .meeting-area {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
      flex: 1;
      min-height: 0;
      padding: 16px;
      overflow: auto;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #172033;
      color: #dbeafe;
      font-weight: 700;
      white-space: nowrap;
    }

    .videos {
      position: relative;
      min-height: 520px;
      border-radius: 16px;
      overflow: hidden;
      background: #05070d;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .video-box {
      position: absolute;
      overflow: hidden;
      background: #111827;
    }

    .video-box.remote {
      inset: 0;
    }

    .video-box.local {
      right: 18px;
      bottom: 18px;
      z-index: 2;
      width: min(280px, 34vw);
      border: 2px solid rgba(255, 255, 255, 0.24);
      border-radius: 14px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    }

    .video-label {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 3;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      color: white;
      font-size: 12px;
      font-weight: 700;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      border-radius: 16px;
      background: #111827;
      border: 1px solid #253044;
    }

    .panel-section {
      padding-bottom: 16px;
      border-bottom: 1px solid #263244;
    }

    .panel-section:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .sdp-grid {
      display: grid;
      gap: 12px;
    }

    .easy-connect {
      display: grid;
      gap: 12px;
    }

    .easy-panel {
      padding: 12px;
      border: 1px solid #263244;
      border-radius: 12px;
      background: #0d1421;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: #111827;
      border-top: 1px solid #253044;
      z-index: 10;
    }

    .sdp-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .chat-row {
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 8px;
    }

    .name-input {
      max-width: none;
    }

    .message-input {
      min-width: 0;
    }

    #log {
      flex: 1;
      min-height: 180px;
      overflow-y: auto;
      border: 1px solid #263244;
      border-radius: 12px;
      padding: 10px;
      background: #0d1421;
    }

    .log-item {
      margin: 0 0 6px;
      line-height: 1.5;
    }

    .log-self {
      color: #93c5fd;
      font-weight: 700;
    }

    .log-peer {
      color: #86efac;
      font-weight: 700;
    }

    .log-system {
      color: #a8b3c7;
    }

    @media (max-width: 920px) {
      .meeting-area {
        grid-template-columns: 1fr;
      }

      .videos {
        min-height: 56vw;
      }

      .side-panel {
        min-height: 420px;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .meeting-area {
        padding: 10px;
      }

      .videos {
        min-height: 66vw;
      }

      .video-box.local {
        width: 42vw;
        right: 10px;
        bottom: 10px;
      }

      .chat-row {
        grid-template-columns: 1fr;
      }

      .toolbar {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        padding: 8px;
      }

      .toolbar button {
        min-height: 42px;
        padding: 8px 4px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>WebRTC Camera Chat</h1>
        <p class="topbar-copy">部屋IDで参加できる小さなビデオ通話アプリ</p>
      </div>
      <p class="status">接続状態: <span id="connectionState">未接続</span></p>
    </header>

    <div class="meeting-area">
      <section class="videos" aria-label="映像">
        <div class="video-box remote">
          <video id="remoteVideo" autoplay playsinline></video>
          <span class="video-label">相手</span>
        </div>

        <div class="video-box local">
          <video id="localVideo" autoplay playsinline muted></video>
          <span class="video-label">自分</span>
        </div>
      </section>

      <aside class="side-panel">
        <section class="panel-section">
          <h2>かんたん接続</h2>
          <div class="easy-connect">
            <section class="easy-panel">
              <h3>1人目</h3>
              <button id="createRoomButton">部屋IDを作る</button>
              <div class="sdp-actions">
                <input id="roomId" type="text" readonly placeholder="部屋ID">
                <button id="copyRoomButton" class="secondary">コピー</button>
              </div>
            </section>

            <section class="easy-panel">
              <h3>2人目</h3>
              <input id="joinRoomId" type="text" placeholder="相手の部屋ID">
              <div class="sdp-actions">
                <button id="joinRoomButton">参加する</button>
              </div>
            </section>
          </div>
        </section>

        <section class="panel-section">
          <h2>チャット</h2>
          <div class="chat-row">
            <input id="nameInput" class="name-input" type="text" placeholder="名前">
            <input id="messageInput" class="message-input" type="text" placeholder="メッセージ">
            <button id="sendButton">送信</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>ログ</h2>
          <div id="log"></div>
        </section>

        <details>
          <summary>手動Offer/Answer</summary>
          <div class="sdp-grid">
            <section>
              <h3>自分の接続情報</h3>
              <textarea id="localSdp" readonly></textarea>
              <div class="sdp-actions">
                <button id="copyLocalButton" class="secondary">コピー</button>
              </div>
            </section>

            <section>
              <h3>相手の接続情報</h3>
              <textarea id="remoteSdp"></textarea>
              <div class="sdp-actions">
                <button id="setRemoteButton">相手の情報を読み込む</button>
              </div>
            </section>
          </div>
        </details>
      </aside>
    </div>

    <nav class="toolbar" aria-label="通話操作">
      <button id="startCameraButton">開始</button>
      <button id="muteButton" class="secondary">ミュート</button>
      <button id="toggleCameraButton" class="secondary">ビデオ停止</button>
      <button id="stopCameraButton" class="danger">退出</button>
      <button id="createOfferButton" class="secondary">手動Offer</button>
    </nav>
  </main>

  <script src="peerjs.min.js"></script>
  <script>
    const startCameraButton = document.getElementById("startCameraButton");
    const toggleCameraButton = document.getElementById("toggleCameraButton");
    const muteButton = document.getElementById("muteButton");
    const stopCameraButton = document.getElementById("stopCameraButton");
    const createRoomButton = document.getElementById("createRoomButton");
    const roomId = document.getElementById("roomId");
    const copyRoomButton = document.getElementById("copyRoomButton");
    const joinRoomId = document.getElementById("joinRoomId");
    const joinRoomButton = document.getElementById("joinRoomButton");
    const createOfferButton = document.getElementById("createOfferButton");
    const setRemoteButton = document.getElementById("setRemoteButton");
    const copyLocalButton = document.getElementById("copyLocalButton");
    const localSdp = document.getElementById("localSdp");
    const remoteSdp = document.getElementById("remoteSdp");
    const log = document.getElementById("log");
    const nameInput = document.getElementById("nameInput");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const localVideo = document.getElementById("localVideo");
    const remoteVideo = document.getElementById("remoteVideo");
    const connectionState = document.getElementById("connectionState");

    const peer = new RTCPeerConnection({
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
      ]
    });

    let channel;
    let localStream;
    let easyPeer;
    let easyConnection;
    let easyCall;

    function addLog(text, type = "system") {
      const div = document.createElement("div");
      div.className = "log-item log-" + type;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function setupChannel() {
      channel.onopen = () => {
        addLog("DataChannelが開きました。チャットできます。");
      };

      channel.onmessage = (event) => {
        addLog("相手: " + event.data, "peer");
      };

      channel.onclose = () => {
        addLog("DataChannelが閉じました。");
      };
    }

    function addLocalTracksToPeer() {
      if (!localStream) {
        return;
      }

      const existingTracks = peer.getSenders().map((sender) => sender.track);

      localStream.getTracks().forEach((track) => {
        if (!existingTracks.includes(track)) {
          peer.addTrack(track, localStream);
        }
      });
    }

    function waitIceGatheringComplete() {
      return new Promise((resolve) => {
        if (peer.iceGatheringState === "complete") {
          resolve();
          return;
        }

        const handleStateChange = () => {
          if (peer.iceGatheringState === "complete") {
            peer.removeEventListener("icegatheringstatechange", handleStateChange);
            resolve();
          }
        };

        peer.addEventListener("icegatheringstatechange", handleStateChange);
      });
    }

    async function startLocalMedia() {
      if (localStream) {
        return localStream;
      }

      localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });

      localVideo.srcObject = localStream;
      addLocalTracksToPeer();
      return localStream;
    }

    function setupEasyConnection(connection) {
      easyConnection = connection;

      easyConnection.on("open", () => {
        connectionState.textContent = "connected";
        addLog("かんたん接続のチャットが開きました。");
      });

      easyConnection.on("data", (message) => {
        addLog("相手: " + message, "peer");
      });

      easyConnection.on("close", () => {
        connectionState.textContent = "closed";
        addLog("かんたん接続のチャットが閉じました。");
      });

      easyConnection.on("error", (error) => {
        addLog("かんたん接続のチャットでエラー: " + error.message);
      });
    }

    function setupEasyCall(call) {
      easyCall = call;

      easyCall.on("stream", (remoteStream) => {
        remoteVideo.srcObject = remoteStream;
        connectionState.textContent = "connected";
        addLog("かんたん接続で相手の映像と音声を受け取りました。");
      });

      easyCall.on("close", () => {
        addLog("かんたん接続の通話が閉じました。");
      });

      easyCall.on("error", (error) => {
        addLog("かんたん接続の通話でエラー: " + error.message);
      });
    }

    function createEasyPeer() {
      if (typeof Peer === "undefined") {
        addLog("かんたん接続ライブラリを読み込めませんでした。ネットワークを確認してください。");
        return null;
      }

      if (easyPeer && !easyPeer.destroyed) {
        easyPeer.destroy();
      }

      easyPeer = new Peer({
        debug: 1
      });

      easyPeer.on("connection", (connection) => {
        setupEasyConnection(connection);
      });

      easyPeer.on("call", async (call) => {
        try {
          const stream = await startLocalMedia();
          call.answer(stream);
          setupEasyCall(call);
          addLog("相手からの通話に応答しました。");
        } catch (error) {
          addLog("通話に応答できませんでした: " + error.message);
        }
      });

      easyPeer.on("disconnected", () => {
        connectionState.textContent = "disconnected";
        addLog("かんたん接続のシグナリングが切断されました。");
      });

      easyPeer.on("error", (error) => {
        addLog("かんたん接続でエラー: " + error.message);
      });

      return easyPeer;
    }

    startCameraButton.onclick = async () => {
      try {
        const wasStarted = Boolean(localStream);
        await startLocalMedia();

        if (wasStarted) {
          addLog("カメラとマイクはすでに開始しています。");
        } else {
          addLog("自分のカメラとマイクを開始し、WebRTC接続に追加しました。");
        }
      } catch (error) {
        addLog("カメラまたはマイクを取得できませんでした: " + error.message);
      }
    };

    createRoomButton.onclick = async () => {
      try {
        await startLocalMedia();
        const peerForRoom = createEasyPeer();

        if (!peerForRoom) {
          return;
        }

        peerForRoom.on("open", (id) => {
          roomId.value = id;
          connectionState.textContent = "waiting";
          addLog("部屋IDを作りました。相手にこのIDを伝えてください。");
        });
      } catch (error) {
        addLog("部屋IDを作れませんでした: " + error.message);
      }
    };

    joinRoomButton.onclick = async () => {
      const targetRoomId = joinRoomId.value.trim();

      if (!targetRoomId) {
        addLog("参加する部屋IDを入力してください。");
        return;
      }

      try {
        const stream = await startLocalMedia();
        const peerForJoin = createEasyPeer();

        if (!peerForJoin) {
          return;
        }

        peerForJoin.on("open", () => {
          setupEasyConnection(peerForJoin.connect(targetRoomId));
          setupEasyCall(peerForJoin.call(targetRoomId, stream));
          connectionState.textContent = "connecting";
          addLog("部屋IDへ接続しています。");
        });
      } catch (error) {
        addLog("部屋に参加できませんでした: " + error.message);
      }
    };

    copyRoomButton.onclick = async () => {
      if (!roomId.value) {
        addLog("コピーする部屋IDがまだありません。");
        return;
      }

      try {
        await navigator.clipboard.writeText(roomId.value);
        addLog("部屋IDをコピーしました。");
      } catch (error) {
        addLog("部屋IDをコピーできませんでした。手動でコピーしてください。");
      }
    };

    toggleCameraButton.onclick = () => {
      if (!localStream) {
        addLog("まだカメラとマイクを開始していません。");
        return;
      }

      const videoTracks = localStream.getVideoTracks();

      if (videoTracks.length === 0) {
        addLog("映像トラックがありません。");
        return;
      }

      const videoTrack = videoTracks[0];
      videoTrack.enabled = !videoTrack.enabled;

      if (videoTrack.enabled) {
        toggleCameraButton.textContent = "ビデオ停止";
        addLog("カメラをオンにしました。");
      } else {
        toggleCameraButton.textContent = "ビデオ開始";
        addLog("カメラをオフにしました。");
      }
    };

    muteButton.onclick = () => {
      if (!localStream) {
        addLog("まだカメラとマイクを開始していません。");
        return;
      }

      const audioTracks = localStream.getAudioTracks();

      if (audioTracks.length === 0) {
        addLog("音声トラックがありません。");
        return;
      }

      const audioTrack = audioTracks[0];
      audioTrack.enabled = !audioTrack.enabled;

      if (audioTrack.enabled) {
        muteButton.textContent = "ミュート";
        addLog("マイクをオンにしました。");
      } else {
        muteButton.textContent = "ミュート解除";
        addLog("マイクをミュートしました。");
      }
    };

    stopCameraButton.onclick = () => {
      if (!localStream) {
        addLog("停止するカメラとマイクがありません。");
        return;
      }

      localStream.getTracks().forEach((track) => {
        track.stop();
      });

      localStream = null;
      localVideo.srcObject = null;
      toggleCameraButton.textContent = "ビデオ停止";
      muteButton.textContent = "ミュート";
      addLog("カメラとマイクを停止しました。");
    };

    peer.ontrack = (event) => {
      remoteVideo.srcObject = event.streams[0];
      addLog("相手の映像または音声を受け取りました。");
    };

    peer.onconnectionstatechange = () => {
      connectionState.textContent = peer.connectionState;
      addLog("接続状態: " + peer.connectionState);
    };

    peer.ondatachannel = (event) => {
      channel = event.channel;
      setupChannel();
      addLog("DataChannelを受け取りました。");
    };

    createOfferButton.onclick = async () => {
      try {
        if (!localStream) {
          addLog("先にカメラとマイクを開始すると、映像と音声をOfferに含められます。");
        }

        addLocalTracksToPeer();
        channel = peer.createDataChannel("chat");
        setupChannel();

        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);
        await waitIceGatheringComplete();

        localSdp.value = JSON.stringify(peer.localDescription);
        addLog("Offerを作りました。相手にコピーしてください。");
      } catch (error) {
        addLog("Offerを作れませんでした: " + error.message);
      }
    };

    setRemoteButton.onclick = async () => {
      try {
        const description = JSON.parse(remoteSdp.value);
        await peer.setRemoteDescription(description);

        if (description.type === "offer") {
          addLocalTracksToPeer();

          const answer = await peer.createAnswer();
          await peer.setLocalDescription(answer);
          await waitIceGatheringComplete();

          localSdp.value = JSON.stringify(peer.localDescription);
          addLog("Answerを作りました。相手にコピーしてください。");
        } else {
          addLog("Answerを読み込みました。接続を待ちます。");
        }
      } catch (error) {
        addLog("相手の接続情報を読み込めませんでした: " + error.message);
      }
    };

    copyLocalButton.onclick = async () => {
      if (!localSdp.value) {
        addLog("コピーする接続情報がまだありません。");
        return;
      }

      try {
        await navigator.clipboard.writeText(localSdp.value);
        addLog("自分の接続情報をコピーしました。");
      } catch (error) {
        addLog("コピーできませんでした。テキストエリアから手動でコピーしてください。");
      }
    };

    sendButton.onclick = () => {
      const text = messageInput.value.trim();
      const name = nameInput.value.trim() || "名無し";

      if (!text) {
        addLog("送信するメッセージを入力してください。");
        return;
      }

      if (easyConnection && easyConnection.open) {
        const message = name + ": " + text;
        easyConnection.send(message);
        addLog("自分: " + message, "self");
        messageInput.value = "";
        messageInput.focus();
        return;
      }

      if (!channel || channel.readyState !== "open") {
        addLog("まだ接続されていません。");
        return;
      }

      const message = name + ": " + text;
      channel.send(message);
      addLog("自分: " + message, "self");
      messageInput.value = "";
      messageInput.focus();
    };

    messageInput.onkeydown = (event) => {
      if (event.key === "Enter") {
        sendButton.click();
      }
    };
  </script>
</body>
</html>
